name: Deploy Blueprint

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz libgraphviz-dev texlive-latex-base

      - name: Install rocqblueprint
        run: |
          pip install rocqblueprint

      - name: Set up OCaml and opam
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.2'

      - name: Install Coq and MathComp via opam
        run: |
          opam repo add coq-released https://coq.inria.fr/opam/released
          opam install coq.8.20.0 coq-mathcomp-ssreflect -y
          eval $(opam env)

      - name: Build project and generate coqdoc
        run: |
          eval $(opam env)
          coq_makefile -f _CoqProject -o CoqMakefile
          make -f CoqMakefile
          make -f CoqMakefile html

      - name: Build blueprint
        run: |
          cd blueprint/src
          rocqblueprint web

      - name: Combine blueprint and docs
        run: |
          cp -r html blueprint/src/web/doc

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blueprint/src/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
