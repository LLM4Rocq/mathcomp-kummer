name: Deploy Blueprint

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    container:
      image: coqorg/coq:8.20.0-ocaml-4.14.2-flambda
      options: --user root
    steps:
      - uses: actions/checkout@v4

      - name: Install MathComp
        run: |
          opam repo add coq-released https://coq.inria.fr/opam/released
          opam install coq-mathcomp-ssreflect -y
          eval $(opam env)

      - name: Build project and generate coqdoc
        run: |
          eval $(opam env)
          coq_makefile -f _CoqProject -o CoqMakefile
          make -f CoqMakefile
          make -f CoqMakefile html

      - name: Upload coqdoc artifact
        uses: actions/upload-artifact@v4
        with:
          name: coqdoc-html
          path: html/

  build-blueprint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz libgraphviz-dev texlive-latex-base

      - name: Install rocqblueprint
        run: |
          pip install rocqblueprint

      - name: Build blueprint
        run: |
          cd blueprint/src
          rocqblueprint web

      - name: Upload blueprint artifact
        uses: actions/upload-artifact@v4
        with:
          name: blueprint-web
          path: blueprint/src/web/

  combine-and-deploy:
    needs: [build-docs, build-blueprint]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download blueprint
        uses: actions/download-artifact@v4
        with:
          name: blueprint-web
          path: site/

      - name: Download coqdoc
        uses: actions/download-artifact@v4
        with:
          name: coqdoc-html
          path: site/doc/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
